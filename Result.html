<!DOCTYPE html>
<html>
<head>
    <title>Resume Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

<h1>Resume Analysis Result</h1>

<h2>Resume Score: {{ score }}%</h2>

<h3>Skills Found</h3>
<ul>
{% for skill in skills %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<h3>Recommended Skills</h3>
<ul>
{% for skill in recommendations %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<a href="/">Analyze Another Resume</a>

</div>

</body>
</html>
